<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Przewijaj produkty i kupuj jednym kliknięciem – QualitetMarket.">
  <title>Feed Produktów – QualitetMarket</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    /* ── Floating top bar ─────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .topbar a { pointer-events: all; }

    .topbar-logo {
      font-weight: 700;
      font-size: 1.05rem;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    .topbar-cart {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ── Snap scroll feed ─────────────────────────────────────────── */
    #feed {
      height: 100vh;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Single product slide ─────────────────────────────────────── */
    .product {
      height: 100vh;
      height: 100dvh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .product-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .product-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
    }

    /* dark gradient so text is always readable */
    .product-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.08) 35%,
        rgba(0,0,0,0.65) 65%,
        rgba(0,0,0,0.92) 100%
      );
    }

    /* ── Product info panel ───────────────────────────────────────── */
    .product-content {
      position: relative;
      z-index: 2;
      padding: 20px 20px calc(28px + env(safe-area-inset-bottom, 0px));
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .product-name {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .product-price {
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 18px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── Buy now button ───────────────────────────────────────────── */
    .btn-buy {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 4px 20px rgba(108,99,255,0.45);
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-buy:active {
      transform: scale(0.97);
      opacity: 0.88;
    }

    /* ── Loading screen ───────────────────────────────────────────── */
    #feed-loading {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: rgba(255,255,255,0.6);
      background: #0f0f13;
      scroll-snap-align: start;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / empty state ──────────────────────────────────────── */
    .feed-state {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
      background: #0f0f13;
      scroll-snap-align: start;
    }

    .feed-state p { color: rgba(255,255,255,0.55); font-size: 1rem; line-height: 1.6; }

    .feed-state a {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 28px;
      background: #6c63ff;
      color: #fff;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* ── Desktop: center-column layout ───────────────────────────── */
    @media (min-width: 600px) {
      #feed {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .product {
        width: 400px;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Floating top bar -->
  <header class="topbar" aria-label="Nawigacja">
    <a href="index.html" class="topbar-logo">✨ QualitetMarket</a>
    <a href="koszyk.html" class="topbar-cart" aria-label="Przejdź do koszyka">
      🛒 <span data-cart-badge>0</span>
    </a>
  </header>

  <!-- Snap-scroll feed -->
  <div id="feed" role="feed" aria-label="Feed produktów">

    <!-- Loading placeholder (replaced after data loads) -->
    <div id="feed-loading" aria-live="polite">
      <div class="spinner"></div>
      <span>Ładowanie produktów…</span>
    </div>

  </div>

  <script>window.QM_API_BASE = 'https://api.uszefaqualitet.pl/api';</script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
