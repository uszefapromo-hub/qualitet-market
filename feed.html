<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QualitetMarket - Feed</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#0b0b13;color:#fff;padding-bottom:80px}
a{text-decoration:none;color:inherit}

.top{position:sticky;top:0;background:#111827;border-bottom:1px solid #222;z-index:50}
.topin{max-width:900px;margin:0 auto;padding:16px;display:flex;justify-content:space-between;align-items:center}
.brand{font-size:22px;font-weight:800}

.wrap{max-width:900px;margin:0 auto;padding:20px}

.post{background:#111;border:1px solid #222;border-radius:20px;margin-bottom:16px;overflow:hidden}
.head{padding:14px;font-weight:700}
.text{padding:0 14px 12px;color:#ccc}
.media{height:320px;background:linear-gradient(135deg,#7c3aed,#06b6d4)}
.media.alt{background:linear-gradient(135deg,#22c55e,#06b6d4)}
.media.alt2{background:linear-gradient(135deg,#ef4444,#f59e0b)}

.box{display:flex;justify-content:space-between;align-items:center;padding:14px;border-top:1px solid #222}
.price{font-size:20px;font-weight:800}

button{padding:10px 14px;border:none;border-radius:10px;background:#7c3aed;color:#fff;cursor:pointer}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#0b0b13;padding:10px;border-top:1px solid #222}
.nav a{color:#fff}
</style>
</head>
<body>

<header class="top">
  <div class="topin">
    <div class="brand">Feed</div>
  </div>
</header>

<main class="wrap">

<div class="post">
  <div class="head">🔥 Sneakers Pulse X</div>
  <div class="text">Nowy drop – kliknij i kup od razu</div>
  <div class="media"></div>
  <div class="box">
    <div class="price">279 zł</div>
    <button onclick="alert('Kupione')">Kup</button>
  </div>
</div>

<div class="post">
  <div class="head">💰 Bluza Urban</div>
  <div class="text">Bestseller w tym tygodniu</div>
  <div class="media alt"></div>
  <div class="box">
    <div class="price">169 zł</div>
    <button onclick="alert('Kupione')">Kup</button>
  </div>
</div>

<div class="post">
  <div class="head">🎧 Wave ANC</div>
  <div class="text">Top jakość audio</div>
  <div class="media alt2"></div>
  <div class="box">
    <div class="price">219 zł</div>
    <button onclick="alert('Kupione')">Kup</button>
  </div>
</div>

</main>

<nav class="nav">
  <a href="sklep.html">Sklep</a>
  <a href="feed.html">Feed</a>
  <a href="panel-sklepu.html">Panel</a>
  <a href="hurtownie.html">Import</a>
</nav>

</body>
</html>
