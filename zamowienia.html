<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout | QualitetMarket</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="platforma.html"><span class="brand-badge">QM</span><span>QualitetMarket</span></a>
    <nav class="nav"><a href="platforma.html" class="">Platforma</a><a href="dashboard.html" class="">Dashboard</a><a href="sklep.html" class="">Sklep</a><a href="koszyk.html" class="active">Koszyk</a><a href="zamowienia.html" class="">Zamówienia</a><a href="panel-sklepu.html" class="">Panel sklepu</a><a href="hurtownie.html" class="">Hurtownie</a><a href="cennik.html" class="">Cennik</a></nav>
    <div class="top-actions">
      <span class="plan-pill gradient-pill">Plan: <strong data-current-plan>BASIC</strong></span>
      <a class="btn mobile-only" href="dashboard.html">Menu</a>
    </div>
  </div>
</header>

<main>
  <section class="section">
    <div class="container" style="max-width:780px">
      <div class="card pad">
        <h2>Checkout</h2>
        <p class="muted" style="margin-bottom:14px">Zamówienie zapisuje się do <strong>qm_orders_v1</strong>.</p>
        <form id="checkout-form" class="form">
          <label>Imię i nazwisko<input class="input" name="customer" required></label>
          <label>Email<input class="input" type="email" name="email" required></label>
          <label>Telefon<input class="input" name="phone" required></label>
          <label>Adres dostawy<textarea name="address" required></textarea></label>
          <label>Notatka<textarea name="note"></textarea></label>
          <button class="btn primary" type="submit">Złóż zamówienie</button>
        </form>
      </div>
    </div>
  </section>
</main>

<footer class="footer"><div class="container">QualitetMarket dark marketplace • mobile first • GitHub Pages safe</div></footer>
<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
