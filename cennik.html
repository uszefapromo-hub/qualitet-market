<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hurtownie | QualitetMarket</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="platforma.html"><span class="brand-badge">QM</span><span>QualitetMarket</span></a>
    <nav class="nav"><a href="platforma.html" class="">Platforma</a><a href="dashboard.html" class="">Dashboard</a><a href="sklep.html" class="">Sklep</a><a href="koszyk.html" class="">Koszyk</a><a href="zamowienia.html" class="">Zamówienia</a><a href="panel-sklepu.html" class="">Panel sklepu</a><a href="hurtownie.html" class="active">Hurtownie</a><a href="cennik.html" class="">Cennik</a></nav>
    <div class="top-actions">
      <span class="plan-pill gradient-pill">Plan: <strong data-current-plan>BASIC</strong></span>
      <a class="btn mobile-only" href="dashboard.html">Menu</a>
    </div>
  </div>
</header>

<main>
  <section class="section">
    <div class="container grid cols-2">
      <div class="card pad">
        <h2>Hurtownie</h2>
        <p class="muted" style="margin-bottom:14px">Import zapisuje dane do <strong>qm_products_by_supplier_v1</strong>.</p>
        <div class="btns" style="margin-bottom:14px">
          <button class="btn primary" id="import-default-products">Załaduj demo produkty</button>
          <button class="btn secondary" id="download-sample-csv">Pobierz sample CSV</button>
        </div>
        <label>Import CSV
          <input class="input" id="csv-upload" type="file" accept=".csv">
        </label>
        <div id="import-status" class="notice" style="margin-top:14px">Gotowe do importu.</div>
      </div>
      <div class="card pad">
        <h3>Dostępne hurtownie</h3>
        <div id="supplier-list" class="list"></div>
      </div>
    </div>
  </section>
</main>

<footer class="footer"><div class="container">QualitetMarket dark marketplace • mobile first • GitHub Pages safe</div></footer>
<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
