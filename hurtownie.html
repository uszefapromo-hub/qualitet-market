<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Import z hurtowni</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;background:#0b0b13;color:#fff;padding:20px;padding-bottom:80px}
  .wrap{max-width:980px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .nav{display:flex;gap:10px;flex-wrap:wrap}
  .nav a{color:#fff;text-decoration:none;padding:10px 14px;border:1px solid #333;border-radius:12px;background:#111}
  .card{background:#111;border:1px solid #222;border-radius:16px;padding:20px;margin-bottom:16px}
  h1{margin:0 0 16px}
  h3{margin-top:0}
  .row{display:grid;grid-template-columns:1fr auto;gap:10px}
  input,select{padding:12px;border-radius:10px;border:1px solid #333;background:#000;color:#fff;width:100%}
  button{padding:12px 16px;border:none;border-radius:10px;background:#7c3aed;color:#fff;cursor:pointer;font-weight:700}
  button.secondary{background:#222;border:1px solid #333}
  .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .product{background:#0d0d15;border:1px solid #222;border-radius:14px;padding:16px}
  .muted{color:#aaa;font-size:14px}
  .price{font-size:22px;font-weight:800;margin:8px 0}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .status{margin-top:10px;color:#9ca3af}
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;
    background:#0b0b13;padding:10px;border-top:1px solid #222;z-index:999;
  }
  .bottom-nav a{color:#fff;text-decoration:none}
  @media (max-width:700px){
    .row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Hurtownie</h1>
      <div class="muted">Import produktów z feedu XML / JSON do sklepu</div>
    </div>
    <nav class="nav">
      <a href="sklep.html">Sklep</a>
      <a href="feed.html">Feed</a>
      <a href="panel-sklepu.html">Panel</a>
    </nav>
  </div>

  <div class="card">
    <h3>1. URL feedu</h3>
    <div class="row">
      <input id="feedUrl" placeholder="https://hurtownia.pl/feed.xml">
      <button onclick="loadFeed()">Pobierz produkty</button>
    </div>
    <div class="toolbar">
      <button class="secondary" onclick="loadDemo()">Wczytaj demo</button>
      <select id="margin">
        <option value="0">Bez marży</option>
        <option value="10">Marża 10%</option>
        <option value="20" selected>Marża 20%</option>
        <option value="30">Marża 30%</option>
        <option value="50">Marża 50%</option>
      </select>
    </div>
    <div class="status" id="status">Wklej URL albo kliknij demo.</div>
  </div>

  <div class="card">
    <h3>2. Produkty</h3>
    <div class="products" id="products"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="sklep.html">Sklep</a>
  <a href="feed.html">Feed</a>
  <a href="panel-sklepu.html">Panel</a>
  <a href="hurtownie.html">Import</a>
</nav>

<script>
const API = 'https://api.uszefaqualitet.pl/api';

function getMarginMultiplier(){
  const val = Number(document.getElementById('margin').value || 0);
  return 1 + (val / 100);
}

function setStatus(text){
  document.getElementById('status').textContent = text;
}

function normalizeProducts(list){
  const m = getMarginMultiplier();
  return list.map((p, idx) => {
    const basePrice = Number(p.price || p.cena || 99);
    return {
      id: p.id || ('p' + idx),
      name: p.name || p.title || p.nazwa || 'Produkt hurtownia',
      price: Math.round(basePrice * m * 100) / 100,
      stock: Number(p.stock || p.ilosc || 10),
      description: p.description || p.opis || 'Produkt zaimportowany z hurtowni'
    };
  });
}

function render(list){
  const el = document.getElementById('products');
  if(!list.length){
    el.innerHTML = '<div class="muted">Brak produktów.</div>';
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="product">
      <strong>${p.name}</strong>
      <div class="muted">Stan: ${p.stock} szt.</div>
      <div class="price">${p.price.toFixed(2)} zł</div>
      <div class="muted">${p.description}</div>
      <div class="toolbar">
        <button onclick='addProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Dodaj do sklepu</button>
      </div>
    </div>
  `).join('');
}

function parseXmlProducts(text){
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = [...xml.querySelectorAll('item, product')].slice(0, 24);
  return items.map((item, idx) => ({
    id: idx + 1,
    name: item.querySelector('title, name')?.textContent?.trim() || `Produkt ${idx+1}`,
    price: Number((item.querySelector('price, cena')?.textContent || '99').replace(',', '.')),
    stock: Number(item.querySelector('stock, ilosc')?.textContent || 10),
    description: item.querySelector('description, opis')?.textContent?.trim() || 'Import z XML'
  }));
}

async function loadFeed(){
  const url = document.getElementById('feedUrl').value.trim();
  if(!url) return alert('Wklej URL feedu');

  setStatus('Pobieranie feedu...');
  try{
    const res = await fetch(url);
    const text = await res.text();

    let list = [];
    if(url.toLowerCase().includes('.json') || text.trim().startsWith('{') || text.trim().startsWith('[')){
      const json = JSON.parse(text);
      const raw = Array.isArray(json) ? json : (json.items || json.products || []);
      list = normalizeProducts(raw);
    } else {
      list = normalizeProducts(parseXmlProducts(text));
    }

    render(list);
    setStatus(`Załadowano ${list.length} produktów.`);
  }catch(e){
    console.log(e);
    setStatus('Feed nie odpowiedział. Wczytano demo.');
    loadDemo();
  }
}

function loadDemo(){
  const demo = normalizeProducts([
    {name:'Produkt hurtownia 1', price:59, stock:14, description:'Demo produkt z feedu'},
    {name:'Produkt hurtownia 2', price:129, stock:8, description:'Demo produkt z feedu'},
    {name:'Produkt hurtownia 3', price:249, stock:4, description:'Demo produkt z feedu'},
    {name:'Produkt hurtownia 4', price:89, stock:20, description:'Demo produkt z feedu'}
  ]);
  render(demo);
  setStatus(`Wczytano ${demo.length} produktów demo.`);
}

async function addProduct(p){
  try{
    await fetch(API + '/seller/products',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(p)
    });
    alert('Dodano do sklepu');
  }catch(e){
    alert('API nie odpowiedziało. Produkt dodany lokalnie demo.');
  }
}

loadDemo();
</script>
</body>
</html>
