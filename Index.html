    @media (max-width:1100px){

<body>
  <header class="topbar">
    <div class="brand" data-route="home">
      <div class="logo">Q</div>
      <div>
        <strong>QualitetMarket</strong>
        <span>Jedna platforma pod jednym linkiem</span>
      </div>
    </div>
    <nav class="nav desktop-nav">
      <button data-route="home">Start</button>
      <button data-route="shop">Sklep</button>
      <button data-route="feed">Feed</button>
      <button data-route="suppliers">Dostawcy</button>
      <button data-route="dashboard">Dashboard</button>
    </nav>
    <div class="top-actions">
      <button class="ghost" id="searchBtn">Szukaj</button>
      <button class="primary" id="cartBtn">Koszyk <span id="cartBadge">0</span></button>
    </div>
  </header>

  <main id="view"></main>

  <div class="mobile-nav">
    <button data-route="home">Start</button>
    <button data-route="shop">Sklep</button>
    <button data-route="feed">Feed</button>
    <button data-route="suppliers">B2B</button>
    <button data-route="dashboard">Panel</button>
  </div>

  <aside id="drawer" class="drawer">
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-head">
        <h3 style="margin:0">Koszyk</h3>
        <button class="icon-btn" id="closeDrawer">✕</button>
      </div>
      <div id="cartItems"></div>
      <div class="summary">
        <div><span>Pozycje</span><strong id="sumItems">0</strong></div>
        <div><span>Suma</span><strong id="sumSubtotal">0 zł</strong></div>
        <div><span>Dostawa</span><strong id="sumShipping">0 zł</strong></div>
        <div class="total"><span>Razem</span><strong id="sumTotal">0 zł</strong></div>
      </div>
      <button class="primary block" id="checkoutBtn">Przejdź do checkoutu</button>
    </div>
  </aside>

  <dialog id="productDialog"></dialog>
  <dialog id="checkoutDialog"></dialog>

  <script>
    const API_URL = 'https://dummyjson.com/products?limit=0';
    const CART_KEY = 'qm_onefile_cart_v2';
    const state = {products:[], filtered:[], visible:12, cart:JSON.parse(localStorage.getItem(CART_KEY)||'[]'), route:'home', product:null};

    const fallback = [
      {id:1001,title:'Smartwatch Active X',brand:'Qualitet',category:'wearables',description:'Lekki zegarek do codziennego użycia, treningu i pracy. Bestseller z wysoką marżą.',price:699,discountPercentage:18,stock:27,thumbnail:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=900&q=80'},
      {id:1002,title:'Słuchawki ANC Pro',brand:'Qualitet',category:'audio',description:'Bezprzewodowe słuchawki z redukcją szumów i nowoczesnym designem.',price:449,discountPercentage:16,stock:38,thumbnail:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=900&q=80'},
      {id:1003,title:'Beauty Set Glow',brand:'Qualitet',category:'beauty',description:'Zestaw beauty z dobrym AOV i potencjałem bundle.',price:189,discountPercentage:14,stock:54,thumbnail:'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=900&q=80'},
      {id:1004,title:'Plecak City Travel',brand:'Qualitet',category:'mens-bags',description:'Mocny produkt lifestyle, świetny do sklepu i feedu virali.',price:259,discountPercentage:21,stock:42,thumbnail:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80'}
    ];

    const supplierCards = [
      {name:'Qualitet Electronics',desc:'Szybko rotujące gadżety, audio, akcesoria i wearables.',margin:'18–42%',sku:'12 400+'},
      {name:'Urban Home B2B',desc:'Dom, dekoracje, lifestyle i produkty viral do contentu.',margin:'22–48%',sku:'8 900+'},
      {name:'Beauty Flow Supply',desc:'Beauty, wellness, self-care i produkty wysokiej częstotliwości zakupu.',margin:'25–55%',sku:'15 100+'},
      {name:'Sport Motion Hub',desc:'Akcesoria fitness, outdoor i produkty impulsowe do sklepu.',margin:'17–39%',sku:'6 700+'}
    ];

    const feedPosts = [
      {author:'Q Trends',time:'Teraz',text:'Viralne produkty z wysoką marżą rosną na feedzie. Zbieraj inspiracje i wrzucaj do sklepu jednym kliknięciem.'},
      {author:'Seller Lab',time:'12 min temu',text:'Zestawy produktów i bundle dają wyższy koszyk niż pojedynczy zakup. Ustaw cross-sell przy produkcie premium.'},
      {author:'Creator Hub',time:'30 min temu',text:'Live commerce + krótkie video to najlepszy ruch na wejściu. Platforma musi wyglądać dynamicznie i zachęcać do scrollowania.'}
    ];

    const $ = s => document.querySelector(s);
    const esc = s => String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const money = v => new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN',maximumFractionDigits:2}).format(Number(v||0));
    const oldPrice = p => Number(p.discountPercentage) ? p.price/(1-p.discountPercentage/100) : p.price*1.18;
    const cartCount = () => state.cart.reduce((s,i)=>s+i.qty,0);
    const cartSubtotal = () => state.cart.reduce((s,i)=>s+i.qty*i.price,0);
    const ship = () => state.cart.length ? 19.99 : 0;
    const total = () => cartSubtotal()+ship();

    async function loadProducts(){
      try{
        const res = await fetch(API_URL,{cache:'no-store'});
        const data = await res.json();
        state.products = Array.isArray(data.products) && data.products.length ? data.products : fallback;
      }catch{
        state.products = fallback;
      }
      state.filtered = [...state.products];
      render();
    }

    function saveCart(){
      localStorage.setItem(CART_KEY, JSON.stringify(state.cart));
      updateCart();
    }

    function addToCart(id, qty=1){
      const p = state.products.find(x => String(x.id)===String(id));
      if(!p) return;
      const ex = state.cart.find(x => String(x.id)===String(id));
      if(ex) ex.qty += qty;
      else state.cart.push({id:p.id,title:p.title,price:p.price,thumbnail:p.thumbnail,qty});
      saveCart();
    }

    function removeFromCart(id){
      state.cart = state.cart.filter(x => String(x.id)!==String(id));
      saveCart();
    }

    function updateCart(){
      $('#cartBadge').textContent = cartCount();
      const wrap = $('#cartItems');
      if(!state.cart.length){
        wrap.innerHTML = '<div class="empty">Koszyk jest pusty.</div>';
      } else {
        wrap.innerHTML = state.cart.map(i => `
          <div class="cart-item">
            <img src="${esc(i.thumbnail)}" alt="">
            <div>
              <strong>${esc(i.title)}</strong>
              <div class="muted">${money(i.price)} / szt.</div>
              <input class="field" style="width:78px;padding:8px 10px;margin-top:6px" type="number" min="1" value="${i.qty}" data-qty="${i.id}">
            </div>
            <div style="text-align:right">
              <strong>${money(i.qty*i.price)}</strong>
              <button class="icon-btn" data-remove="${i.id}">✕</button>
            </div>
          </div>`).join('');
        wrap.querySelectorAll('[data-remove]').forEach(b => b.onclick = () => removeFromCart(b.dataset.remove));
        wrap.querySelectorAll('[data-qty]').forEach(inp => inp.onchange = () => {
          const item = state.cart.find(x => String(x.id)===String(inp.dataset.qty));
          if(item){ item.qty = Math.max(1, Number(inp.value||1)); saveCart(); }
        });
      }
      $('#sumItems').textContent = cartCount();
      $('#sumSubtotal').textContent = money(cartSubtotal());
      $('#sumShipping').textContent = money(ship());
      $('#sumTotal').textContent = money(total());
    }

    function productCard(p){
      return `<article class="product-card">
        <div class="product-media"><img src="${esc(p.thumbnail)}" alt="${esc(p.title)}"></div>
        <div class="product-body">
          <div class="chips">
            <span class="chip">${esc(p.category)}</span>
            <span class="chip">${esc(p.brand||'Qualitet')}</span>
            <span class="chip">Stan: ${Math.max(0, Number(p.stock||0))}</span>
          </div>
          <div class="title">${esc(p.title)}</div>
          <div class="desc">${esc((p.description||'').slice(0,94))}</div>
          <div><span class="price">${money(p.price)}</span><span class="old">${money(oldPrice(p))}</span></div>
          <div class="actions">
            <button class="ghost block" data-view="${p.id}">Zobacz</button>
            <button class="primary block" data-add="${p.id}">Dodaj</button>
          </div>
        </div>
      </article>`;
    }

    function homeView(){
      const cats = [...new Set(state.products.map(p=>p.category))].slice(0,8);
      return `<section class="page">
        <div class="hero">
          <div class="hero-card">
            <div class="badge">PEŁNY INDEX W JEDNYM PLIKU</div>
            <h1>Kupuj, sprzedawaj i scrolluj jak w nowoczesnym marketplace</h1>
            <p class="muted">To jest jedna aplikacja pod jednym linkiem. Masz sklep, feed, dostawców, dashboard, koszyk i checkout bez folderów i bez dodatkowych plików.</p>
            <div class="hero-actions">
              <button class="primary" data-route="shop">Przeglądaj sklep</button>
              <button class="ghost" data-route="feed">Otwórz feed</button>
              <button class="ghost" data-route="dashboard">Panel sprzedawcy</button>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><strong>${state.products.length}</strong><span>produktów</span></div>
            <div class="metric"><strong>${[...new Set(state.products.map(p=>p.category))].length}</strong><span>kategorii</span></div>
            <div class="metric"><strong>${cartCount()}</strong><span>w koszyku</span></div>
            <div class="metric"><strong>LIVE</strong><span>jedna aplikacja</span></div>
          </div>
        </div>

        <div class="notice">Teraz już nie ma krótkiego indexu. To jest pełny, jeden plik HTML pod podmianę.</div>

        <div class="section-head"><div><h2>Platforma</h2><div class="muted">Wszystkie sekcje w jednym miejscu</div></div></div>
        <div class="grid grid-4">
          ${tile('Sklep / produkty','Marketplace z kategoriami, produktami i pełnym widokiem produktu.','shop')}
          ${tile('Feed / social commerce','Przewijasz trendy i nowości jak w social app.','feed')}
          ${tile('Dostawcy B2B','Przegląd dostawców, marże i kierunki importu.','suppliers')}
          ${tile('Dashboard','Panel sprzedawcy, KPI i szybkie akcje.','dashboard')}
        </div>

        <div class="section-head" style="margin-top:24px"><div><h2>Trendujące teraz</h2><div class="muted">Mocny start wizualny</div></div></div>
        <div class="grid grid-4">${state.products.slice(0,8).map(productCard).join('')}</div>

        <div class="section-head" style="margin-top:24px"><div><h2>Kategorie</h2><div class="muted">Szybkie wejście w obszary z potencjałem</div></div></div>
        <div class="grid grid-4">
          ${cats.map(c => `<div class="supplier-card"><h3>${esc(c)}</h3><p class="muted">Filtruj produkty pod kategorię, stock i marżę.</p><button class="primary block" data-cat="${esc(c)}">Wejdź</button></div>`).join('')}
        </div>
      </section>`;
    }

    function tile(title,text,route){
      return `<div class="supplier-card"><h3>${title}</h3><p class="muted">${text}</p><button class="primary block" data-route="${route}">Otwórz</button></div>`;
    }

    function shopView(){
      const categories = [...new Set(state.products.map(p=>p.category))].sort();
      const visible = state.filtered.slice(0, state.visible);
      return `<section class="page">
        <div class="section-head"><div><h2>Sklep</h2><div class="muted">Pełen katalog pod jednym linkiem</div></div></div>
        <div class="controls">
          <input class="field" id="shopSearch" placeholder="Szukaj produktu, marki, kategorii...">
          <select class="field" id="shopCategory">
            <option value="">Wszystkie kategorie</option>
            ${categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}
          </select>
          <select class="field" id="shopSort">
            <option value="featured">Polecane</option>
            <option valu
