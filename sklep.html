<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QualitetMarket - Sklep</title>
  <script>window.QM_API_BASE = window.QM_API_BASE || 'https://api.uszefaqualitet.pl/api';</script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #050b1f;
      --panel: #0d1735;
      --panel-2: #101c40;
      --line: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #9eb0db;
      --accent: #7c3aed;
      --accent-2: #22d3ee;
      --price: #36d7ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #f87171;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, #0a1330 0%, #091128 100%);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1460px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      min-width: 260px;
      font-size: 30px;
      font-weight: 800;
      white-space: nowrap;
    }

    .logo span { color: var(--accent); }

    .search {
      flex: 1;
      min-width: 260px;
    }

    .search input {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #101938;
      color: #fff;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
    }

    .cart-btn {
      border: 0;
      height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      white-space: nowrap;
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      padding: 22px 20px 40px;
    }

    .page-title {
      margin: 0 0 8px;
      font-size: 42px;
    }

    .page-subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 20px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 92px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .side-title {
      margin: 0 0 14px;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .category-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .category-btn.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.22), rgba(34,211,238,0.16));
      border-color: rgba(124,58,237,0.7);
    }

    .filter-box {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 16px;
    }

    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .price-row input,
    .sort-select {
      width: 100%;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #101938;
      color: #fff;
      padding: 0 12px;
      outline: none;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      color: #fff;
      font-size: 14px;
    }

    .reset-btn {
      width: 100%;
      margin-top: 12px;
      height: 42px;
      border: 0;
      border-radius: 12px;
      background: #1b2a58;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .content { min-width: 0; }

    .content-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
    }

    .card-media {
      background: #fff;
      height: 220px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card-media img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .badges {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(17,24,39,0.92);
      color: #fff;
    }

    .badge-new { background: rgba(34,197,94,0.9); }
    .badge-top { background: rgba(124,58,237,0.9); }
    .badge-seller { background: rgba(34,211,238,0.9); color: #06101f; }

    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .card-category {
      font-size: 12px;
      color: #94a8dc;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
      min-height: 46px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 56px;
    }

    .prices {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: auto;
    }

    .card-price {
      font-size: 30px;
      font-weight: 800;
      color: var(--price);
    }

    .meta-line {
      font-size: 13px;
      color: var(--muted);
    }

    .meta-line span {
      color: #fff;
      font-weight: 700;
    }

    .stock {
      font-size: 13px;
      color: var(--success);
      font-weight: 700;
    }

    .buy-btn {
      margin-top: 6px;
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .empty,
    .loader {
      grid-column: 1 / -1;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .header-inner { flex-wrap: wrap; }
      .logo { min-width: auto; }
    }

    @media (max-width: 640px) {
      .page { padding: 18px 14px 30px; }
      .header-inner { padding: 12px 14px; }
      .page-title { font-size: 34px; }
      .products { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo"><span>Q</span>ualitetMarket</div>
      <div class="search">
        <input type="text" id="searchInput" placeholder="Szukaj produktu..." />
      </div>
      <button class="cart-btn" onclick="openCart()">
        Koszyk (<span id="cartCount">0</span>)
      </button>
    </div>
  </header>

  <div class="page">
    <h1 class="page-title">Sklep</h1>
    <p class="page-subtitle">Działający widok marketplace: produkty z hurtowni i od sprzedawców, z priorytetem dla Twoich ludzi.</p>

    <div class="layout">
      <aside class="sidebar">
        <h2 class="side-title">Kategorie</h2>
        <div class="category-list" id="categoryList">
          <button class="category-btn active" data-category="all">Wszystkie</button>
        </div>

        <div class="filter-box">
          <label class="label">Cena od / do</label>
          <div class="price-row">
            <input type="number" id="minPrice" placeholder="od" min="0" />
            <input type="number" id="maxPrice" placeholder="do" min="0" />
          </div>
        </div>

        <div class="filter-box">
          <label class="label">Sortowanie</label>
          <select id="sortSelect" class="sort-select">
            <option value="best">Najlepsze dopasowanie</option>
            <option value="newest">Nowości</option>
            <option value="priceAsc">Cena rosnąco</option>
            <option value="priceDesc">Cena malejąco</option>
            <option value="titleAsc">Nazwa A-Z</option>
          </select>
        </div>

        <div class="filter-box">
          <label class="check-row">
            <input type="checkbox" id="onlyMarketplace" />
            <span>Tylko sprzedawcy z platformy</span>
          </label>
          <label class="check-row">
            <input type="checkbox" id="onlyNew" />
            <span>Tylko nowości</span>
          </label>
        </div>

        <button class="reset-btn" id="resetFilters">Wyczyść filtry</button>
      </aside>

      <main class="content">
        <div class="content-top">
          <div class="status" id="status">Ładowanie produktów...</div>
          <div class="sort-wrap">
            <span>Widoczne produkty:</span>
            <strong id="visibleCount">0</strong>
          </div>
        </div>

        <div class="products" id="products">
          <div class="loader">Ładowanie produktów...</div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const API_BASE = window.QM_API_BASE || 'https://api.uszefaqualitet.pl/api';

    const SOURCE_ENDPOINTS = [
      API_BASE + '/products?status=active&limit=500',
      API_BASE + '/products?limit=500',
      API_BASE + '/marketplace/products?status=active&limit=500',
      API_BASE + '/seller-products?status=active&limit=500',
      API_BASE + '/catalog/products?status=active&limit=500'
    ];

    const FALLBACK_LIVE_ENDPOINT = 'https://fakestoreapi.com/products';

    const STATIC_FALLBACK_PRODUCTS = [
      {
        id: 'static-1',
        title: 'Słuchawki Bezprzewodowe Pro',
        description: 'Wysokiej jakości słuchawki z redukcją szumów i 30h czasu pracy.',
        category: 'Elektronika',
        image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop',
        price: 299,
        selling_price: 299,
        is_featured: true,
        stock: 10
      },
      {
        id: 'static-2',
        title: 'Smartwatch Sport Edition',
        description: 'Zegarek sportowy z GPS, monitorem tętna i wodoodpornością IP68.',
        category: 'Elektronika',
        image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop',
        price: 499,
        selling_price: 499,
        is_featured: true,
        stock: 5
      },
      {
        id: 'static-3',
        title: 'Torba Skórzana Premium',
        description: 'Elegancka torba ze skóry naturalnej, idealna na każdą okazję.',
        category: 'Moda',
        image: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400&h=400&fit=crop',
        price: 189,
        selling_price: 189,
        is_featured: false,
        stock: 15
      },
      {
        id: 'static-4',
        title: 'Kawa Specialty Arabica 250g',
        description: 'Świeżo palona kawa single origin z Etiopii. Nuty cytrusów i czekolady.',
        category: 'Żywność',
        image: 'https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=400&h=400&fit=crop',
        price: 49,
        selling_price: 49,
        is_featured: false,
        stock: 50
      }
    ];

    const MY_PRICE_MULTIPLIER = 1.18;
    const MY_PRICE_FIXED_ADD = 0;

    let rawOffers = [];
    let groupedProducts = [];
    let filteredProducts = [];
    let currentCategory = 'all';

    const productsEl = document.getElementById('products');
    const categoryListEl = document.getElementById('categoryList');
    const searchInput = document.getElementById('searchInput');
    const minPriceInput = document.getElementById('minPrice');
    const maxPriceInput = document.getElementById('maxPrice');
    const sortSelect = document.getElementById('sortSelect');
    const onlyMarketplaceInput = document.getElementById('onlyMarketplace');
    const onlyNewInput = document.getElementById('onlyNew');
    const statusEl = document.getElementById('status');
    const visibleCountEl = document.getElementById('visibleCount');
    const cartCountEl = document.getElementById('cartCount');
    const resetFiltersBtn = document.getElementById('resetFilters');

    function normalizeCategoryName(category) {
      const map = {
        "electronics": "Elektronika",
        "jewelery": "Biżuteria",
        "men's clothing": "Moda męska",
        "women's clothing": "Moda damska",
        "home": "Dom i Ogród",
        "sport": "Sport",
        "beauty": "Uroda",
        "health": "Zdrowie"
      };
      const key = String(category || '').toLowerCase().trim();
      return map[key] || category || 'Inne';
    }

    function shortText(text, max = 90) {
      if (!text) return 'Brak opisu';
      return text.length > max ? text.slice(0, max) + '...' : text;
    }

    function formatPrice(price) {
      return Number(price || 0).toLocaleString('pl-PL', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      }) + ' zł';
    }

    function getCart() {
      try {
        const cart = JSON.parse(localStorage.getItem('qm_cart') || '[]');
        return Array.isArray(cart) ? cart : [];
      } catch (e) {
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem('qm_cart', JSON.stringify(cart));
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
      cartCountEl.textContent = total;
    }

    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find(item => String(item.id) === String(product.id));

      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({
          id: product.id,
          title: product.title,
          price: product.displayPrice,
          image: product.image,
          qty: 1
        });
      }

      saveCart(cart);
      updateCartCount();
      alert('Dodano do koszyka');
    }

    function openCart() {
      window.location.href = 'koszyk.html';
    }

    function extractList(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.products)) return data.products;
      if (Array.isArray(data.data)) return data.data;
      if (Array.isArray(data.items)) return data.items;
      if (Array.isArray(data.results)) return data.results;
      return [];
    }

    function parseDate(value) {
      if (!value) return null;
      const d = new Date(value);
      return isNaN(d.getTime()) ? null : d;
    }

    function isNewByDate(dateValue) {
      const d = parseDate(dateValue);
      if (!d) return false;
      const now = Date.now();
      const diff = now - d.getTime();
      const days = diff / (1000 * 60 * 60 * 24);
      return days <= 14;
    }

    function calculateMyPrice(raw) {
      const directPrice =
        raw.seller_price ??
        raw.your_price ??
        raw.custom_price ??
        raw.final_price ??
        raw.retail_price ??
        raw.selling_price;

      if (directPrice !== undefined && directPrice !== null && directPrice !== '') {
        return Number(directPrice);
      }

      const base =
        raw.wholesale_price ??
        raw.purchase_price ??
        raw.cost_price ??
        raw.price_net ??
        raw.price ??
        0;

      return Number((Number(base) * MY_PRICE_MULTIPLIER) + MY_PRICE_FIXED_ADD);
    }

    function normalizeOffer(raw, sourceName) {
      const id = raw.id || raw.product_id || raw.sku || raw.external_id || (sourceName + '-' + Math.random().toString(36).slice(2));
      const title = raw.title || raw.name || raw.product_name || 'Produkt';
      const description = raw.description || raw.short_description || raw.desc || '';
      const category = raw.category || raw.category_name || raw.group_name || 'Inne';
      const image = raw.image || raw.image_url || raw.photo || raw.thumbnail || '';
      const stock = Number(raw.stock ?? raw.quantity ?? raw.qty ?? 0);

      const basePrice = Number(
        raw.wholesale_price ??
        raw.purchase_price ??
        raw.cost_price ??
        raw.price_net ??
        raw.price ??
        0
      );

      const displayPrice = calculateMyPrice(raw);

      const isMarketplaceSeller = Boolean(
        raw.is_marketplace_seller === true ||
        raw.is_seller_product === true ||
        raw.seller_id ||
        raw.vendor_id ||
        raw.user_id
      );

      const isFeatured = Boolean(raw.is_featured || raw.featured || raw.is_promoted || raw.promoted);
      const isBestseller = Boolean(raw.is_bestseller || raw.bestseller);
      const isNew = Boolean(raw.is_new || raw.new) || isNewByDate(raw.created_at || raw.createdAt || raw.date_added);

      const supplierName =
        raw.supplier_name ||
        raw.wholesaler_name ||
        raw.vendor_name ||
        raw.seller_name ||
        raw.store_name ||
        sourceName ||
        'Źródło';

      return {
        offerId: id,
        title,
        description,
        category,
        image,
        stock,
        basePrice,
        displayPrice,
        supplierName,
        isMarketplaceSeller,
        isFeatured,
        isBestseller,
        isNew,
        createdAt: raw.created_at || raw.createdAt || raw.date_added || '',
        raw
      };
    }

    function groupOffersIntoProducts(offers) {
      const map = new Map();

      offers.forEach(offer => {
        const key = (
          String(offer.title || '').trim().toLowerCase() +
          '|' +
          String(offer.category || '').trim().toLowerCase()
        );

        if (!map.has(key)) {
          map.set(key, {
            id: key,
            title: offer.title,
            description: offer.description,
            category: offer.category,
            image: offer.image,
            offers: [],
            bestOffer: null,
            displayPrice: 0,
            totalStock: 0,
            offersCount: 0,
            hasMarketplaceSeller: false,
            isFeatured: false,
            isBestseller: false,
            isNew: false,
            score: 0
          });
        }

        const group = map.get(key);
        group.offers.push(offer);
        group.totalStock += offer.stock || 0;
        group.hasMarketplaceSeller = group.hasMarketplaceSeller || offer.isMarketplaceSeller;
        group.isFeatured = group.isFeatured || offer.isFeatured;
        group.isBestseller = group.isBestseller || offer.isBestseller;
        group.isNew = group.isNew || offer.isNew;

        if (!group.image && offer.image) {
          group.image = offer.image;
        }

        if (!group.description && offer.description) {
          group.description = offer.description;
        }
      });

      const products = Array.from(map.values()).map(group => {
        group.offers.sort((a, b) => {
          const aScore = getOfferPriorityScore(a);
          const bScore = getOfferPriorityScore(b);

          if (bScore !== aScore) return bScore - aScore;
          if (a.displayPrice !== b.displayPrice) return a.displayPrice - b.displayPrice;
          return (b.stock || 0) - (a.stock || 0);
        });

        group.bestOffer = group.offers[0];
        group.displayPrice = group.bestOffer ? group.bestOffer.displayPrice : 0;
        group.offersCount = group.offers.length;
        group.score = getProductPriorityScore(group);

        return group;
      });

      return products;
    }

    function getOfferPriorityScore(offer) {
      let score = 0;
      if (offer.isMarketplaceSeller) score += 30;
      if (offer.isFeatured) score += 25;
      if (offer.isNew) score += 20;
      if (offer.isBestseller) score += 20;
      if ((offer.stock || 0) > 0) score += 10;
      if (offer.image) score += 5;
      return score;
    }

    function getProductPriorityScore(product) {
      let score = 0;
      if (product.hasMarketplaceSeller) score += 30;
      if (product.isFeatured) score += 25;
      if (product.isNew) score += 20;
      if (product.isBestseller) score += 20;
      if (product.offersCount > 1) score += 8;
      if ((product.totalStock || 0) > 0) score += 8;
      return score;
    }

    async function fetchJsonArray(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + url);
      const data = await res.json();
      return extractList(data);
    }

    async function loadFromOwnApi() {
      for (const endpoint of SOURCE_ENDPOINTS) {
        try {
          const list = await fetchJsonArray(endpoint);
          if (Array.isArray(list) && list.length) {
            return { list, source: endpoint };
          }
        } catch (e) {
          console.warn('Endpoint nie działa:', endpoint, e);
        }
      }
      throw new Error('Brak danych z własnego API');
    }

    async function loadProducts() {
      statusEl.textContent = 'Ładowanie produktów z API...';

      try {
        let sourceName = 'Qualitet API';
        let rows = [];

        try {
          const own = await loadFromOwnApi();
          rows = own.list;
          sourceName = 'Qualitet API';
        } catch (ownError) {
          const fallbackRows = await fetchJsonArray(FALLBACK_LIVE_ENDPOINT);
          rows = fallbackRows;
          sourceName = 'Live fallback';
        }

        rawOffers = rows.map(item => normalizeOffer(item, sourceName));
        groupedProducts = groupOffersIntoProducts(rawOffers);

        statusEl.textContent =
          'Załadowano ' + groupedProducts.length + ' produktów i ' + rawOffers.length + ' ofert.';

        renderCategories();
        applyFilters();
      } catch (e) {
        console.warn('Wszystkie źródła API niedostępne, używam produktów zastępczych.', e);
        rawOffers = STATIC_FALLBACK_PRODUCTS.map(item => normalizeOffer(item, 'Katalog'));
        groupedProducts = groupOffersIntoProducts(rawOffers);
        statusEl.textContent = 'Produkty z katalogu demonstracyjnego.';
        renderCategories();
        applyFilters();
      }
    }

    function renderCategories() {
      const categories = [...new Set(groupedProducts.map(p => p.category).filter(Boolean))];

      categoryListEl.innerHTML = '<button class="category-btn active" data-category="all">Wszystkie</button>';

      categories
        .sort((a, b) => String(normalizeCategoryName(a)).localeCompare(String(normalizeCategoryName(b)), 'pl'))
        .forEach(category => {
          const btn = document.createElement('button');
          btn.className = 'category-btn';
          btn.dataset.category = category;
          btn.textContent = normalizeCategoryName(category);
          categoryListEl.appendChild(btn);
        });

      categoryListEl.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          categoryListEl.querySelectorAll('.category-btn').forEach(x => x.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = btn.dataset.category;
          applyFilters();
        });
      });
    }

    function renderProducts(products) {
      visibleCountEl.textContent = products.length;

      if (!products.length) {
        productsEl.innerHTML = '<div class="empty">Brak produktów dla tych filtrów.</div>';
        return;
      }

      productsEl.innerHTML = '';

      products.forEach(product => {
        const bestOffer = product.bestOffer || {};
        const safeTitle = product.title || 'Produkt';
        const safeCategory = normalizeCategoryName(product.category || 'Inne');
        const safeDesc = shortText(product.description || bestOffer.description || 'Brak opisu');
        const safeImage = product.image || bestOffer.image || '';
        const safeStock = Number(product.totalStock || 0);

        const badges = [];
        if (product.isNew) badges.push('<span class="badge badge-new">Nowość</span>');
        if (product.isFeatured || product.isBestseller) badges.push('<span class="badge badge-top">Top</span>');
        if (product.hasMarketplaceSeller) badges.push('<span class="badge badge-seller">Sprzedawca</span>');

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="card-media">
            <div class="badges">${badges.join('')}</div>
            <img src="${safeImage}" alt="${safeTitle}" loading="lazy" />
          </div>
          <div class="card-body">
            <div class="card-category">${safeCategory}</div>
            <div class="card-title">${safeTitle}</div>
            <div class="card-desc">${safeDesc}</div>

            <div class="prices">
              <div class="card-price">od ${formatPrice(product.displayPrice)}</div>
              <div class="meta-line">Oferty: <span>${product.offersCount}</span></div>
              <div class="meta-line">Najlepsza oferta: <span>${bestOffer.supplierName || '—'}</span></div>
              <div class="stock">Stan łączny: ${safeStock}</div>
            </div>

            <button class="buy-btn">Dodaj do koszyka</button>
          </div>
        `;

        const buyBtn = card.querySelector('.buy-btn');
        buyBtn.addEventListener('click', function () {
          addToCart({
            id: product.id,
            title: product.title,
            displayPrice: product.displayPrice,
            image: safeImage
          });
        });

        const img = card.querySelector('img');
        img.addEventListener('error', function () {
          img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="500" height="500">
              <rect width="100%" height="100%" fill="#f3f4f6"/>
              <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
               font-family="Arial" font-size="28" fill="#111827">Brak zdjęcia</text>
            </svg>
          `);
        });

        productsEl.appendChild(card);
      });
    }

    function applyFilters() {
      const search = searchInput.value.trim().toLowerCase();
      const minPrice = minPriceInput.value ? Number(minPriceInput.value) : null;
      const maxPrice = maxPriceInput.value ? Number(maxPriceInput.value) : null;
      const sort = sortSelect.value;
      const onlyMarketplace = onlyMarketplaceInput.checked;
      const onlyNew = onlyNewInput.checked;

      let result = [...groupedProducts];

      if (currentCategory !== 'all') {
        result = result.filter(p => p.category === currentCategory);
      }

      if (search) {
        result = result.filter(p =>
          String(p.title || '').toLowerCase().includes(search) ||
          String(p.description || '').toLowerCase().includes(search)
        );
      }

      if (minPrice !== null) {
        result = result.filter(p => Number(p.displayPrice) >= minPrice);
      }

      if (maxPrice !== null) {
        result = result.filter(p => Number(p.displayPrice) <= maxPrice);
      }

      if (onlyMarketplace) {
        result = result.filter(p => p.hasMarketplaceSeller);
      }

      if (onlyNew) {
        result = result.filter(p => p.isNew);
      }

      if (sort === 'priceAsc') {
        result.sort((a, b) => Number(a.displayPrice) - Number(b.displayPrice));
      } else if (sort === 'priceDesc') {
        result.sort((a, b) => Number(b.displayPrice) - Number(a.displayPrice));
      } else if (sort === 'titleAsc') {
        result.sort((a, b) => String(a.title).localeCompare(String(b.title), 'pl'));
      } else if (sort === 'newest') {
        result.sort((a, b) => Number(b.isNew) - Number(a.isNew) || b.score - a.score);
      } else {
        result.sort((a, b) => b.score - a.score || Number(a.displayPrice) - Number(b.displayPrice));
      }

      filteredProducts = result;
      renderProducts(filteredProducts);
    }

    function resetFilters() {
      currentCategory = 'all';
      searchInput.value = '';
      minPriceInput.value = '';
      maxPriceInput.value = '';
      sortSelect.value = 'best';
      onlyMarketplaceInput.checked = false;
      onlyNewInput.checked = false;

      categoryListEl.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === 'all');
      });

      applyFilters();
    }

    searchInput.addEventListener('input', applyFilters);
    minPriceInput.addEventListener('input', applyFilters);
    maxPriceInput.addEventListener('input', applyFilters);
    sortSelect.addEventListener('change', applyFilters);
    onlyMarketplaceInput.addEventListener('change', applyFilters);
    onlyNewInput.addEventListener('change', applyFilters);
    resetFiltersBtn.addEventListener('click', resetFilters);

    updateCartCount();
    loadProducts();
  </script>
</body>
</html>
