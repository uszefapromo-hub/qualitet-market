<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>QualitetMarket — Master Index Full</title>
<meta name="description" content="Pełna platforma marketplace/social-commerce pod jednym linkiem.">
<style>
:root{--bg:#050b1d;--bg2:#08112b;--card:#101c48;--line:rgba(255,255,255,.09);--text:#f5f7ff;--muted:#aeb9df;--primary:#7c3aed;--primary2:#22d3ee;--accent:#ff7a18;--radius:24px;--shadow:0 28px 70px rgba(0,0,0,.34)}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:radial-gradient(1200px 700px at 100% -10%, rgba(124,58,237,.22), transparent 50%),radial-gradient(900px 500px at -10% 0%, rgba(34,211,238,.12), transparent 45%),linear-gradient(180deg,var(--bg2),var(--bg) 58%, #030815);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
img{display:block;max-width:100%}button,input,select,textarea{font:inherit}a{text-decoration:none;color:inherit}
.container{max-width:1480px;margin:0 auto;padding:0 18px}
.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;background:rgba(5,11,29,.84);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary2))}
.brand strong{display:block;font-size:22px}.brand span{display:block;font-size:12px;color:var(--muted)}
.nav{display:flex;gap:10px;flex-wrap:wrap}.nav button,.btn,.btn-ghost,.tab-btn{border:none;border-radius:16px;padding:12px 16px;cursor:pointer;transition:.18s transform}
.nav button,.btn-ghost,.tab-btn{background:rgba(255,255,255,.04);color:#fff;border:1px solid var(--line)}.btn{background:linear-gradient(135deg,var(--primary),#5b7bff);color:#fff;font-weight:800}.btn-accent{background:linear-gradient(135deg,var(--accent),#ffb347);color:#111;font-weight:900}
.nav button:hover,.btn:hover,.btn-ghost:hover,.tab-btn:hover{transform:translateY(-1px)}
.top-actions{display:flex;gap:10px;align-items:center}#cartBadge{display:inline-grid;place-items:center;min-width:20px;height:20px;padding:0 6px;margin-left:6px;border-radius:999px;background:#fff;color:#111;font-size:12px}
.page{padding:22px 0 100px}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
.card,.hero-card,.metric,.feature-card,.product-card,.feed-card,.supplier-card,.panel-card,.price-card,.community-card,.drawer-panel,.modal-card,.notice,.step,.live-card,.auction-card,.seller-card,.category-card,.cta-card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero-card,.feature-card,.supplier-card,.panel-card,.community-card,.price-card,.live-card,.auction-card,.seller-card,.category-card,.cta-card,.feed-card{padding:18px}.hero-card{padding:28px}
.badge{display:inline-flex;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.34)}
h1{margin:16px 0 12px;font-size:clamp(34px,5vw,66px);line-height:1.02;max-width:12ch}h2,h3,p{margin-top:0}.muted{color:var(--muted)}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}.hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.metric{padding:18px}.metric strong{display:block;font-size:32px}.metric span{font-size:13px;color:var(--muted)}
.notice{padding:16px 18px;margin-top:18px}.section{margin-top:24px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;flex-wrap:wrap;margin:0 0 16px}.section-head h2{margin:0;font-size:30px}
.grid{display:grid;gap:16px}.grid-5{grid-template-columns:repeat(5,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:5px 8px;border-radius:999px;font-size:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.controls{display:grid;grid-template-columns:1.3fr .9fr .9fr auto;gap:12px;margin-bottom:18px}.field{width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#fff}.field::placeholder{color:#93a0cb}
.product-card{overflow:hidden;display:flex;flex-direction:column}.product-media{aspect-ratio:1/1;background:linear-gradient(135deg,rgba(124,58,237,.14),rgba(34,211,238,.10));padding:18px}.product-media img{width:100%;height:100%;object-fit:contain}.product-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.title{font-size:16px;font-weight:800;line-height:1.3;min-height:42px}.desc{font-size:13px;color:var(--muted);min-height:38px}.price{font-size:24px;font-weight:900}.old{font-size:12px;text-decoration:line-through;color:var(--muted);margin-left:8px}.actions{display:flex;gap:8px;margin-top:auto}.block{width:100%}
.feed-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--primary2));font-weight:900}
.price-card.popular{outline:2px solid rgba(124,58,237,.55)}.price-val{font-size:34px;font-weight:900}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.big-stat{font-size:34px;font-weight:900}.row{display:flex;justify-content:space-between;align-items:center;gap:12px}.how-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.step{padding:18px}
.social-links{display:flex;gap:10px;flex-wrap:wrap}.social-links a{padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
.tab-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.tab-btn.active{background:rgba(124,58,237,.18);border-color:rgba(124,58,237,.45)}
.status-pill{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}.status-live{background:rgba(239,68,68,.18);color:#ffb9b9;border:1px solid rgba(239,68,68,.36)}.status-upcoming{background:rgba(245,158,11,.18);color:#ffd79a;border:1px solid rgba(245,158,11,.36)}.status-open{background:rgba(34,197,94,.18);color:#b5ffd1;border:1px solid rgba(34,197,94,.36)}
.drawer{position:fixed;inset:0;display:none;z-index:70}.drawer.open{display:block}.drawer-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55)}.drawer-panel{position:absolute;top:0;right:0;width:min(430px,100%);height:100%;padding:18px;overflow:auto;background:#08112b}.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.icon-btn{border:none;background:transparent;color:#fff;font-size:22px;cursor:pointer}
.cart-item{display:grid;grid-template-columns:62px 1fr auto;gap:12px;padding:10px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);margin-bottom:10px}.cart-item img{width:62px;height:62px;object-fit:cover;border-radius:12px;background:#fff}.summary{display:grid;gap:10px;margin:16px 0}.summary>div{display:flex;justify-content:space-between}.summary .total{padding-top:12px;border-top:1px solid var(--line);font-size:18px;font-weight:900}
dialog{border:none;padding:0;background:transparent;color:inherit;width:min(1080px,96vw)}dialog::backdrop{background:rgba(0,0,0,.72)}.modal-card{padding:18px;background:#08112b}.product-modal{display:grid;grid-template-columns:1fr 1fr;gap:18px}.main-image{aspect-ratio:1/1;border-radius:18px;overflow:hidden;background:rgba(255,255,255,.04)}.main-image img{width:100%;height:100%;object-fit:cover}.checkout-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.order-box,.form-box{padding:18px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:65;display:none;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 12px;background:rgba(5,11,29,.96);backdrop-filter:blur(16px);border-top:1px solid var(--line)}.mobile-nav button{border:none;background:rgba(255,255,255,.04);color:#fff;padding:12px 8px;border-radius:14px}
.empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.12);border-radius:18px}
.footer{margin-top:28px;padding:28px 0 120px;border-top:1px solid var(--line)}.footer-grid{display:grid;grid-template-columns:1.2fr .8fr .8fr .8fr;gap:16px}
@media (max-width:1180px){.hero,.product-modal,.checkout-grid{grid-template-columns:1fr}.grid-5{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4,.grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}.controls{grid-template-columns:1fr 1fr}.kpis,.how-grid,.footer-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:720px){.desktop-nav{display:none}.mobile-nav{display:grid}h1{max-width:none}.grid-5,.grid-4,.grid-3,.grid-2,.hero-grid,.how-grid,.footer-grid{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.brand strong{font-size:18px}.topbar{padding:12px}}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand" data-route="home"><div class="logo">Q</div><div><strong>QualitetMarket</strong><span>Master index full — wszystko pod jednym linkiem</span></div></div>
  <nav class="nav desktop-nav">
    <button data-route="home">Start</button>
    <button data-route="shop">Sklep</button>
    <button data-route="feed">Feed</button>
    <button data-route="suppliers">Hurtownie</button>
    <button data-route="dashboard">Panel</button>
  </nav>
  <div class="top-actions">
    <button class="btn-ghost" id="searchBtn">Szukaj</button>
    <button class="btn" id="cartBtn">Koszyk <span id="cartBadge">0</span></button>
  </div>
</header>

<main id="view"></main>

<div class="mobile-nav">
  <button data-route="home">Start</button>
  <button data-route="shop">Sklep</button>
  <button data-route="feed">Feed</button>
  <button data-route="suppliers">B2B</button>
  <button data-route="dashboard">Panel</button>
</div>

<aside id="drawer" class="drawer">
  <div class="drawer-backdrop"></div>
  <div class="drawer-panel">
    <div class="drawer-head"><h3 style="margin:0">Koszyk</h3><button class="icon-btn" id="closeDrawer">✕</button></div>
    <div id="cartItems"></div>
    <div class="summary">
      <div><span>Pozycje</span><strong id="sumItems">0</strong></div>
      <div><span>Suma</span><strong id="sumSubtotal">0 zł</strong></div>
      <div><span>Dostawa</span><strong id="sumShipping">0 zł</strong></div>
      <div class="total"><span>Razem</span><strong id="sumTotal">0 zł</strong></div>
    </div>
    <button class="btn block" id="checkoutBtn">Przejdź do checkoutu</button>
  </div>
</aside>

<dialog id="productDialog"></dialog>
<dialog id="checkoutDialog"></dialog>

<script>
const API_URL='https://dummyjson.com/products?limit=0';
const CART_KEY='qm_master_index_cart_v1';
const state={products:[],filtered:[],visible:12,cart:JSON.parse(localStorage.getItem(CART_KEY)||'[]'),route:'home',activeHomeTab:'featured'};

const fallback=[
{id:1001,title:'Smartwatch Active X',brand:'Qualitet',category:'wearables',description:'Lekki zegarek do codziennego użycia, treningu i pracy. Bestseller z wysoką marżą.',price:699,discountPercentage:18,stock:27,thumbnail:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=900&q=80'},
{id:1002,title:'Słuchawki ANC Pro',brand:'Qualitet',category:'audio',description:'Bezprzewodowe słuchawki z redukcją szumów i nowoczesnym designem.',price:449,discountPercentage:16,stock:38,thumbnail:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=900&q=80'},
{id:1003,title:'Beauty Set Glow',brand:'Qualitet',category:'beauty',description:'Zestaw beauty z dobrym AOV i potencjałem bundle.',price:189,discountPercentage:14,stock:54,thumbnail:'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=900&q=80'},
{id:1004,title:'Plecak City Travel',brand:'Qualitet',category:'mens-bags',description:'Mocny produkt lifestyle, świetny do sklepu i feedu virali.',price:259,discountPercentage:21,stock:42,thumbnail:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80'},
{id:1005,title:'Lampa LED Home Mood',brand:'Qualitet',category:'home-decoration',description:'Produkt premium do wnętrz, contentu i sprzedaży impulsowej.',price:219,discountPercentage:12,stock:31,thumbnail:'https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?auto=format&fit=crop&w=900&q=80'},
{id:1006,title:'Mikrofon Creator USB',brand:'Qualitet',category:'laptops',description:'Sprzęt dla creatorów i live commerce.',price:329,discountPercentage:17,stock:18,thumbnail:'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?auto=format&fit=crop&w=900&q=80'}
];
const feedPosts=[
{author:'Q Trends',time:'Teraz',text:'Viralne produkty z wysoką marżą rosną na feedzie. Zbieraj inspiracje i wrzucaj do sklepu jednym kliknięciem.'},
{author:'Seller Lab',time:'12 min temu',text:'Zestawy produktów i bundle dają wyższy koszyk niż pojedynczy zakup. Ustaw cross-sell przy produkcie premium.'},
{author:'Creator Hub',time:'30 min temu',text:'Live commerce + krótkie video to najlepszy ruch na wejściu. Platforma musi wyglądać dynamicznie i zachęcać do scrollowania.'}
];
const suppliers=[
{name:'Kosmetyki i Uroda',desc:'Produkty kosmetyczne i wellness od sprawdzonych dostawców B2B.',margin:'25–55%',sku:'15 100+'},
{name:'Moda i Odzież',desc:'Odzież, akcesoria i biżuteria od hurtowników B2B.',margin:'18–42%',sku:'12 400+'},
{name:'Elektronika',desc:'Gadżety, elektronika i akcesoria technologiczne B2B.',margin:'17–39%',sku:'6 700+'},
{name:'Dom i Ogród',desc:'Wyposażenie domu, dekoracje i artykuły ogrodnicze.',margin:'22–48%',sku:'8 900+'}
];
const liveSales=[
{title:'Live Beauty Sale',host:'Glow Studio',status:'LIVE',viewers:1284},
{title:'Tech Flash Deals',host:'Qualitet Electronics',status:'LIVE',viewers:932},
{title:'Home Drop 20:00',host:'Urban Home',status:'UPCOMING',viewers:0}
];
const artAuctions=[
{title:'Modern Abstract No. 12',artist:'ArtDistrict',status:'OPEN',bid:'1 850 zł'},
{title:'Digital Neon City',artist:'Mirov',status:'OPEN',bid:'2 300 zł'},
{title:'Luxury Portrait Set',artist:'Studio LX',status:'UPCOMING',bid:'3 900 zł'}
];

const $=s=>document.querySelector(s);
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const money=v=>new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN',maximumFractionDigits:2}).format(Number(v||0));
const oldPrice=p=>Number(p.discountPercentage)?p.price/(1-p.discountPercentage/100):p.price*1.18;
const cartCount=()=>state.cart.reduce((s,i)=>s+i.qty,0);
const cartSubtotal=()=>state.cart.reduce((s,i)=>s+i.qty*i.price,0);
const ship=()=>state.cart.length?19.99:0;
const total=()=>cartSubtotal()+ship();

async function loadProducts(){
  try{
    const res=await fetch(API_URL,{cache:'no-store'});
    const data=await res.json();
    state.products=Array.isArray(data.products)&&data.products.length?data.products:fallback;
  }catch{
    state.products=fallback;
  }
  state.filtered=[...state.products];
  render();
}
function saveCart(){localStorage.setItem(CART_KEY,JSON.stringify(state.cart));updateCart();}
function addToCart(id,qty=1){
  const p=state.products.find(x=>String(x.id)===String(id));
  if(!p) return;
  const ex=state.cart.find(x=>String(x.id)===String(id));
  if(ex) ex.qty+=qty; else state.cart.push({id:p.id,title:p.title,price:p.price,thumbnail:p.thumbnail,qty});
  saveCart();
}
function removeFromCart(id){state.cart=state.cart.filter(x=>String(x.id)!==String(id));saveCart();}
function updateCart(){
  $('#cartBadge').textContent=cartCount();
  const wrap=$('#cartItems');
  if(!state.cart.length){wrap.innerHTML='<div class="empty">Koszyk jest pusty.</div>';}
  else{
    wrap.innerHTML=state.cart.map(i=>`<div class="cart-item"><img src="${esc(i.thumbnail)}" alt=""><div><strong>${esc(i.title)}</strong><div class="muted">${money(i.price)} / szt.</div><input class="field" style="width:78px;padding:8px 10px;margin-top:6px" type="number" min="1" value="${i.qty}" data-qty="${i.id}"></div><div style="text-align:right"><strong>${money(i.qty*i.price)}</strong><button class="icon-btn" data-remove="${i.id}">✕</button></div></div>`).join('');
    wrap.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>removeFromCart(b.dataset.remove));
    wrap.querySelectorAll('[data-qty]').forEach(inp=>inp.onchange=()=>{const item=state.cart.find(x=>String(x.id)===String(inp.dataset.qty));if(item){item.qty=Math.max(1,Number(inp.value||1));saveCart();}});
  }
  $('#sumItems').textContent=cartCount();
  $('#sumSubtotal').textContent=money(cartSubtotal());
  $('#sumShipping').textContent=money(ship());
  $('#sumTotal').textContent=money(total());
}
function productCard(p){
  return `<article class="product-card"><div class="product-media"><img src="${esc(p.thumbnail)}" alt="${esc(p.title)}"></div><div class="product-body"><div class="chips"><span class="chip">${esc(p.category)}</span><span class="chip">${esc(p.brand||'Qualitet')}</span><span class="chip">Stan: ${Math.max(0,Number(p.stock||0))}</span></div><div class="title">${esc(p.title)}</div><div class="desc">${esc((p.description||'').slice(0,94))}</div><div><span class="price">${money(p.price)}</span><span class="old">${money(oldPrice(p))}</span></div><div class="actions"><button class="btn-ghost block" data-view="${p.id}">Zobacz</button><button class="btn block" data-add="${p.id}">Dodaj</button></div></div></article>`;
}
function sectionProducts(title,subtitle,items){
  return `<section class="section"><div class="section-head"><div><h2>${title}</h2><div class="muted">${subtitle}</div></div><button class="btn-ghost" data-route="shop">Zobacz więcej</button></div><div class="grid grid-4">${items.map(productCard).join('')}</div></section>`;
}
function featuredBlocks(){
  return `${sectionProducts('Trending Products','Popularne teraz i najlepiej wyglądające pozycje na wejście.',state.products.slice(0,8))}
  ${sectionProducts('Produkty które zarabiają','Wysokie marże, szybka rotacja, dobry content.',state.products.slice(8,16))}
  ${sectionProducts('Nowości','Właśnie dodane i gotowe do promowania.',state.products.slice(16,24))}`;
}
function sellerBlocks(){
  return `<section class="section"><div class="grid grid-2">
  <div class="panel-card"><h3>Dla sprzedawców</h3><p class="muted">Otwórz sklep online i zarabiaj na marży bez pakowania ani wysyłki.</p><div class="chips"><span class="chip">własne logo</span><span class="chip">import produktów</span><span class="chip">auto zamówienia</span><span class="chip">trial</span></div><div class="actions" style="margin-top:14px"><button class="btn block">Załóż sklep</button><button class="btn-ghost block">Dowiedz się więcej</button></div></div>
  <div class="panel-card"><h3>Dla kupujących</h3><p class="muted">Przeglądaj oferty od sprawdzonych dostawców. Szybka dostawa, uczciwe ceny i prosta realizacja.</p><div class="chips"><span class="chip">elektronika</span><span class="chip">moda</span><span class="chip">dom</span><span class="chip">sport</span></div><div class="actions" style="margin-top:14px"><button class="btn block" data-route="shop">Przejdź do sklepu</button><button class="btn-ghost block" id="miniCartBtn">Mój koszyk</button></div></div>
  </div></section>
  <section class="section"><div class="section-head"><div><h2>Top Stores</h2><div class="muted">Najlepsi sprzedawcy i sklepy na platformie</div></div></div><div class="grid grid-3">
  ${['TwójSklep','TrendHub','UrbanSeller'].map((name,i)=>`<div class="seller-card"><h3>${name}</h3><p class="muted">Mocny sklep z rosnącą sprzedażą i wysoką reputacją.</p><div class="row"><span>Ocena</span><strong>${(4.8+i*0.03).toFixed(2)}</strong></div><div class="row"><span>Zamówienia</span><strong>${1200+i*340}</strong></div><button class="btn block" style="margin-top:14px">Otwórz sklep</button></div>`).join('')}</div></section>`;
}
function creatorBlocks(){
  return `<section class="section"><div class="section-head"><div><h2>Feed społecznościowy</h2><div class="muted">Przewijaj jak na TikToku, kupuj bez wychodzenia z platformy</div></div><button class="btn-ghost" data-route="feed">Otwórz Feed</button></div><div class="grid grid-3">
  ${feedPosts.map(p=>`<article class="feed-card"><div class="feed-top"><div class="avatar">${p.author[0]}</div><div><strong>${p.author}</strong><div class="muted">${p.time}</div></div></div><p>${p.text}</p><div class="chips"><span class="chip">viral</span><span class="chip">social</span><span class="chip">sprzedaż</span></div></article>`).join('')}</div></section>

function render(){
  const view=$('#view');
  if(state.route==='home') view.innerHTML=homeView();
  if(state.route==='shop') view.innerHTML=shopView();
  if(state.route==='feed') view.innerHTML=feedView();
  if(state.route==='suppliers') view.innerHTML=suppliersView();
  if(state.route==='dashboard') view.innerHTML=dashboardView();
  wire();
  updateCart();
}
function wire(){
  document.querySelectorAll('[data-route]').forEach(el=>el.onclick=()=>{state.route=el.dataset.route;location.hash=state.route;render();});
  document.querySelectorAll('[data-view]').forEach(el=>el.onclick=()=>openProduct(el.dataset.view));
  document.querySelectorAll('[data-add]').forEach(el=>el.onclick=()=>addToCart(el.dataset.add,1));
  document.querySelectorAll('[data-home-tab]').forEach(el=>el.onclick=()=>{state.activeHomeTab=el.dataset.homeTab;render();});
  const m=$('#miniCartBtn'); if(m) m.onclick=()=>$('#drawer').classList.add('open');
  const search=$('#shopSearch'),cat=$('#shopCategory'),sort=$('#shopSort'),reset=$('#shopReset'),more=$('#moreBtn');
  if(search) search.oninput=applyFilters;
  if(cat) cat.onchange=applyFilters;
  if(sort) sort.onchange=applyFilters;
  if(reset) reset.onclick=()=>{search.value='';cat.value='';sort.value='featured';applyFilters();};
  if(more) more.onclick=()=>{state.visible+=12;render();};
}
function applyFilters(){
  const q=($('#shopSearch')?.value||'').trim().toLowerCase();
  const cat=$('#shopCategory')?.value||'';
  const sort=$('#shopSort')?.value||'featured';
  let rows=state.products.filter(p=>{const hay=`${p.title} ${p.description} ${p.brand} ${p.category}`.toLowerCase();return (!q||hay.includes(q))&&(!cat||p.category===cat);});
  if(sort==='price-asc') rows.sort((a,b)=>a.price-b.price);
  if(sort==='price-desc') rows.sort((a,b)=>b.price-a.price);
  if(sort==='name-asc') rows.sort((a,b)=>String(a.title).localeCompare(String(b.title),'pl'));
  if(sort==='featured') rows.sort((a,b)=>(oldPrice(b)-b.price)-(oldPrice(a)-a.price));
  state.filtered=rows;state.visible=12;render();
}

  <h2 style="margin:12px 0 8px">${esc(p.title)}</h2><p class="muted">${esc(p.description||'')}</p>

  <div class="actions"><input id="qty" class="field" style="width:88px" type="number" min="1" value="1"><button class="btn block" id="addFromDialog">Dodaj do koszyka</button><button class="btn-ghost block" id="buyNow">Kup teraz</button></div>

  <div class="checkout-grid"><div class="form-box">

  <div class="grid grid-2" style="margin-top:12px"><select class="field"><option>BLIK</option><option>Karta</option><option>Przelew</option></select><select class="field"><option>Kurier 24–72h</option><option>Paczkomat</option></select></div>

  <div class="order-box"><h3 style="margin-top:0">Podsumowanie</h3>${state.cart.map(i=>`<div class="row" style="margin-bottom:8px"><span>${esc(i.title)} × ${i.qty}</span><strong>${money(i.price*i.qty)}</strong></div>`).join('')}

  dlg.showModal();
  $('#closeCheckout').onclick=()=>dlg.close();
  $('#placeOrder').onclick=()=>{const n=$('#coName').value.trim(),e=$('#coEmail').value.trim(),a=$('#coAddress').value.trim();if(!n||!e||!a){$('#coMsg').textContent='Uzupełnij dane zamówienia.';return;}$('#coMsg').textContent='Zamówienie zapisane lokalnie.';state.cart=[];saveCart();setTimeout(()=>dlg.close(),900);};
}
