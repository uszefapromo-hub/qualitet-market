  <style>
    /* ── Community page layout ── */
    .community-shell{max-width:720px;margin:0 auto;padding:24px 16px 80px}
    .community-hero{text-align:center;padding:32px 0 24px}
    .community-hero h1{font-size:clamp(28px,5vw,40px);margin:0 0 8px}
    .community-hero p{color:var(--muted);font-size:15px;margin:0}

    /* ── Compose box ── */
    .compose-card{background:var(--card);border:1px solid var(--stroke);border-radius:20px;padding:20px;margin-bottom:28px}
    .compose-card h3{margin:0 0 14px;font-size:16px;font-weight:700}
    .compose-textarea{width:100%;min-height:90px;padding:12px 14px;background:rgba(15,23,42,.7);border:1px solid var(--stroke);border-radius:14px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box}
    .compose-textarea:focus{outline:2px solid var(--cyan);outline-offset:1px}
    .compose-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .compose-input{flex:1;min-width:140px;padding:10px 14px;background:rgba(15,23,42,.7);border:1px solid var(--stroke);border-radius:12px;color:var(--text);font-size:13px;font-family:inherit}
    .compose-input:focus{outline:2px solid var(--cyan);outline-offset:1px}
    .compose-input::placeholder{color:var(--muted)}
    .compose-submit{padding:10px 22px;border-radius:12px;border:0;background:var(--purple);color:#fff;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s,transform .15s;white-space:nowrap}
    .compose-submit:hover{opacity:.88;transform:translateY(-1px)}
    .compose-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .compose-login-notice{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:14px;padding:16px;text-align:center;color:var(--muted);font-size:14px}
    .compose-login-notice a{color:var(--cyan);font-weight:600}
    .compose-char-count{font-size:11px;color:var(--muted);align-self:center;white-space:nowrap}

    /* ── Post feed ── */
    .posts-feed{display:flex;flex-direction:column;gap:20px}

    /* ── Single post card ── */
    .post-card{background:var(--card);border:1px solid var(--stroke);border-radius:20px;overflow:hidden}
    .post-header{display:flex;align-items:center;gap:12px;padding:16px 16px 0}
    .post-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--purple-dark),var(--cyan-dark));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
    .post-avatar img{width:100%;height:100%;object-fit:cover}
    .post-author{font-weight:700;font-size:14px;margin:0}
    .post-time{font-size:11px;color:var(--muted)}
    .post-body{padding:12px 16px}
    .post-text{font-size:14px;line-height:1.65;margin:0 0 12px;white-space:pre-wrap;word-break:break-word}
    .post-image{width:100%;border-radius:12px;object-fit:cover;max-height:420px;display:block;background:rgba(139,92,246,.08)}
    .post-product-link{display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:8px 14px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:10px;font-size:13px;font-weight:600;color:var(--cyan);text-decoration:none;transition:background .15s}
    .post-product-link:hover{background:rgba(0,212,255,.16)}
    .post-actions{display:flex;align-items:center;gap:4px;padding:6px 12px 14px;border-top:1px solid var(--stroke)}
    .post-action-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
    .post-action-btn:hover{background:rgba(255,255,255,.06);color:#fff}
    .post-action-btn.liked{color:var(--pink)}
    .post-action-btn svg{width:16px;height:16px;flex-shrink:0}

    /* ── Comments inline ── */
    .post-comments{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
    .comment-item{display:flex;gap:10px;align-items:flex-start}
    .comment-avatar{width:28px;height:28px;border-radius:50%;background:rgba(139,92,246,.18);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--purple-bright);flex-shrink:0}
    .comment-bubble{background:rgba(255,255,255,.04);border-radius:10px;padding:8px 12px;flex:1;min-width:0}
    .comment-bubble strong{font-size:12px;font-weight:700}
    .comment-bubble p{font-size:13px;margin:3px 0 0;color:rgba(255,255,255,.8);word-break:break-word}
    .comment-form{display:flex;gap:8px;align-items:center;margin-top:4px}
    .comment-input{flex:1;padding:8px 12px;background:rgba(15,23,42,.7);border:1px solid var(--stroke);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit}
    .comment-input:focus{outline:2px solid var(--cyan);outline-offset:1px}
    .comment-send-btn{padding:8px 14px;border-radius:10px;border:0;background:var(--purple);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .comment-send-btn:hover{opacity:.85}

    /* ── Load more ── */
    .load-more-btn{display:block;width:100%;padding:14px;border-radius:14px;border:1px solid var(--stroke);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .15s,color .15s}
    .load-more-btn:hover{background:rgba(255,255,255,.06);color:#fff}
    .load-more-btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── Success toast ── */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--stroke);border-radius:14px;padding:12px 20px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .25s}
    .toast.show{opacity:1}
    .toast.success{border-color:rgba(34,197,94,.4);color:#22c55e}
    .toast.error{border-color:rgba(239,68,68,.4);color:#ef4444}

    /* ── Skeleton ── */
    .post-skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:20px;height:160px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── Feed tabs ── */
    .feed-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .feed-tab{padding:8px 18px;border-radius:10px;border:1px solid var(--stroke);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .feed-tab.active{background:var(--purple);border-color:var(--purple);color:#fff}
    .feed-tab:hover:not(.active){background:rgba(255,255,255,.06);color:#fff}

    @media(max-width:480px){
      .compose-row{flex-direction:column}
      .compose-input{min-width:unset}
    }
  </style>
</head>

  <script>
  (function () {
    'use strict';

    var API_BASE = window.QM_API_BASE || 'https://api.uszefaqualitet.pl/api';
    var CHAR_LIMIT = 2000;
    var PAGE_SIZE = 15;

    var state = {
      offset: 0,
      tab: 'all',
      loading: false,
      hasMore: true,
    };

    // ── Helpers ────────────────────────────────────────────────────────────────

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function timeAgo(isoStr) {
      if (!isoStr) return '';
      var diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
      if (diff < 60) return 'przed chwilą';
      if (diff < 3600) return Math.floor(diff / 60) + ' min temu';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h temu';
      return Math.floor(diff / 86400) + 'd temu';
    }

    function initials(name) {
      return String(name || '?')
        .trim()
        .split(/\s+/)
        .map(function (w) { return w[0]; })
        .slice(0, 2)
        .join('')
        .toUpperCase() || '?';
    }

    function getToken() {
      return localStorage.getItem('qm_token') || localStorage.getItem('token') || '';
    }

    function isLoggedIn() {
      return Boolean(getToken());
    }

    function getUser() {
      try { return JSON.parse(localStorage.getItem('qm_user') || localStorage.getItem('user') || '{}'); }
      catch (_) { return {}; }
    }

    function showToast(msg, type) {
      var el = document.getElementById('toast');
      if (!el) return;
      el.textContent = msg;
      el.className = 'toast ' + (type || 'success') + ' show';
      clearTimeout(el._t);
      el._t = setTimeout(function () { el.className = 'toast'; }, 3000);
    }

    function apiFetch(path, opts) {
      var headers = Object.assign({ 'Content-Type': 'application/json', 'Accept': 'application/json' }, (opts && opts.headers) || {});
      var tok = getToken();
      if (tok) headers['Authorization'] = 'Bearer ' + tok;
      return fetch(API_BASE + path, Object.assign({}, opts, { headers: headers }))
        .then(function (r) { return r.json().then(function (body) { return { status: r.status, body: body }; }); });
    }

    // ── Compose box ───────────────────────────────────────────────────────────

    function renderCompose() {
      var area = document.getElementById('compose-area');
      if (!area) return;
      if (!isLoggedIn()) {
        area.innerHTML = '<div class="compose-login-notice">Musisz być <a href="login.html">zalogowany</a>, aby dodawać posty. <a href="login.html" class="btn btn-primary" style="margin-left:10px;display:inline-block">Zaloguj się</a></div>';
        return;
      }
      var user = getUser();
      var avatarHtml = '<div class="post-avatar">' + esc(initials(user.name || user.email)) + '</div>';
      area.innerHTML =
        '<div class="compose-card">'
        + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
        + avatarHtml
        + '<h3 style="margin:0;font-size:16px;font-weight:700">Napisz coś do społeczności</h3>'
        + '</div>'
        + '<textarea class="compose-textarea" id="compose-text" placeholder="Podziel się produktem, opinią lub inspiracją…" maxlength="' + CHAR_LIMIT + '" aria-label="Treść posta"></textarea>'
        + '<div class="compose-row">'
        + '<input class="compose-input" id="compose-image" type="url" placeholder="🖼 Link do zdjęcia (opcjonalne)" aria-label="URL zdjęcia">'
        + '<input class="compose-input" id="compose-product" type="url" placeholder="🛒 Link do produktu (opcjonalne)" aria-label="Link do produktu">'
        + '<span class="compose-char-count" id="compose-chars">0&nbsp;/&nbsp;' + CHAR_LIMIT + '</span>'
        + '<button class="compose-submit" id="compose-btn" type="button">Opublikuj</button>'
        + '</div>'
        + '</div>';

      var textarea = document.getElementById('compose-text');
      var charsEl = document.getElementById('compose-chars');
      if (textarea && charsEl) {
        textarea.addEventListener('input', function () {
          charsEl.textContent = textarea.value.length + '\u00a0/\u00a0' + CHAR_LIMIT;
        });
      }

      var btn = document.getElementById('compose-btn');
      if (btn) {
        btn.addEventListener('click', submitPost);
      }
    }

    function submitPost() {
      var btn = document.getElementById('compose-btn');
      var textEl = document.getElementById('compose-text');
      var imgEl = document.getElementById('compose-image');
      var prodEl = document.getElementById('compose-product');
      if (!textEl) return;

      var content = textEl.value.trim();
      if (!content) { showToast('Napisz coś przed publikacją', 'error'); return; }

      var mediaUrls = [];
      var imgVal = imgEl ? imgEl.value.trim() : '';
      if (imgVal) mediaUrls.push(imgVal);

      // Determine post type and product_id from product URL
      var postType = mediaUrls.length > 0 ? 'product' : 'general';
      var prodVal = prodEl ? prodEl.value.trim() : '';
      // Extract product UUID from URL like …/listing.html?product=UUID or direct UUID
      var productId = null;
      if (prodVal) {
        var uuidMatch = prodVal.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
        if (uuidMatch) {
          productId = uuidMatch[0];
          postType = 'product';
        }
      }

      if (btn) { btn.disabled = true; btn.textContent = 'Publikuję…'; }

      var payload = { content: content, post_type: postType, media_urls: mediaUrls };
      if (productId) payload.product_id = productId;

      apiFetch('/social/posts', { method: 'POST', body: JSON.stringify(payload) })
        .then(function (res) {
          if (res.status === 201 && res.body.post) {
            // Prepend new post to feed
            var feed = document.getElementById('posts-feed');
            if (feed) {
              var newHtml = renderPostCard(res.body.post);
              feed.insertAdjacentHTML('afterbegin', newHtml);
              bindPostActions(feed.firstElementChild, res.body.post.id);
            }
            // Clear form
            if (textEl) textEl.value = '';
            if (imgEl) imgEl.value = '';
            if (prodEl) prodEl.value = '';
            var charsEl = document.getElementById('compose-chars');
            if (charsEl) charsEl.textContent = '0\u00a0/\u00a0' + CHAR_LIMIT;
            showToast('Post opublikowany! ✅', 'success');
          } else {
            showToast((res.body && res.body.error) || 'Błąd publikacji', 'error');
          }
        })
        .catch(function () { showToast('Błąd połączenia z serwerem', 'error'); })
        .finally(function () {
          if (btn) { btn.disabled = false; btn.textContent = 'Opublikuj'; }
        });
    }

    // ── Render post card ──────────────────────────────────────────────────────

    function renderPostCard(post) {
      var av = initials(post.author_name);
      var imgHtml = '';
      var mediaUrls = post.media_urls;
      // media_urls can be a JSON string or an array
      if (typeof mediaUrls === 'string') {
        try { mediaUrls = JSON.parse(mediaUrls); } catch (_) { mediaUrls = []; }
      }
      if (Array.isArray(mediaUrls) && mediaUrls[0]) {
        imgHtml = '<img class="post-image" src="' + esc(mediaUrls[0]) + '" alt="Zdjęcie w poście" loading="lazy">';
      }
      var productHtml = '';
      if (post.product_id && post.product_name) {
        productHtml = '<a class="post-product-link" href="listing.html?product=' + esc(post.product_id) + '">🛒 ' + esc(post.product_name) + (post.product_price ? ' — ' + parseFloat(post.product_price).toLocaleString('pl-PL', { style: 'currency', currency: 'PLN', minimumFractionDigits: 2 }) : '') + '</a>';
      } else if (post.product_id) {
        productHtml = '<a class="post-product-link" href="listing.html?product=' + esc(post.product_id) + '">🛒 Zobacz produkt</a>';
      }
      var likeActive = post._likedByMe ? ' liked' : '';
      return '<div class="post-card" data-post-id="' + esc(post.id) + '">'
        + '<div class="post-header">'
        + '<div class="post-avatar">' + esc(av) + '</div>'
        + '<div><p class="post-author">' + esc(post.author_name || 'Użytkownik') + '</p><span class="post-time">' + esc(timeAgo(post.created_at)) + '</span></div>'
        + '</div>'
        + '<div class="post-body">'
        + '<p class="post-text">' + esc(post.content || '') + '</p>'
        + imgHtml
        + productHtml
        + '</div>'
        + '<div class="post-actions">'
        + '<button class="post-action-btn like-btn' + likeActive + '" data-post-id="' + esc(post.id) + '" type="button" aria-label="Polub post">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>'
        + ' <span class="like-count">' + (parseInt(post.likes_count, 10) || 0) + '</span>'
        + '</button>'
        + '<button class="post-action-btn comment-toggle-btn" data-post-id="' + esc(post.id) + '" type="button" aria-label="Komentarze" aria-expanded="false">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>'
        + ' <span>' + (parseInt(post.comments_count, 10) || 0) + ' komentarzy</span>'
        + '</button>'
        + '</div>'
        + '<div class="post-comments" id="comments-' + esc(post.id) + '" style="display:none"></div>'
        + '</div>';
    }

    // ── Bind post action buttons ──────────────────────────────────────────────

    function bindPostActions(cardEl, postId) {
      if (!cardEl) return;

      var likeBtn = cardEl.querySelector('.like-btn');
      if (likeBtn) {
        likeBtn.addEventListener('click', function () {
          if (!isLoggedIn()) { showToast('Zaloguj się, aby polubić', 'error'); return; }
          apiFetch('/social/posts/' + postId + '/like', { method: 'POST' })
            .then(function (res) {
              if (res.status === 200 || res.status === 201) {
                var count = likeBtn.querySelector('.like-count');
                var prev = count ? parseInt(count.textContent, 10) || 0 : 0;
                var isNowLiked = !likeBtn.classList.contains('liked');
                likeBtn.classList.toggle('liked', isNowLiked);
                if (count) count.textContent = isNowLiked ? prev + 1 : Math.max(0, prev - 1);
              }
            })
            .catch(function () {});
        });
      }

      var commentBtn = cardEl.querySelector('.comment-toggle-btn');
      if (commentBtn) {
        commentBtn.addEventListener('click', function () {
          var panel = document.getElementById('comments-' + postId);
          if (!panel) return;
          var isOpen = panel.style.display !== 'none';
          panel.style.display = isOpen ? 'none' : '';
          commentBtn.setAttribute('aria-expanded', String(!isOpen));
          if (!isOpen && !panel.dataset.loaded) {
            loadComments(postId, panel);
          }
        });
      }
    }

    function loadComments(postId, panel) {
      panel.innerHTML = '<div class="mkt-skeleton" style="height:40px;border-radius:10px;margin-bottom:8px"></div>';
      panel.dataset.loaded = '1';
      apiFetch('/social/posts/' + postId)
        .then(function (res) {
          if (res.status !== 200) throw new Error('not found');
          var comments = res.body.comments || [];
          var html = comments.map(function (c) {
            return '<div class="comment-item">'
              + '<div class="comment-avatar">' + esc(initials(c.author_name)) + '</div>'
              + '<div class="comment-bubble"><strong>' + esc(c.author_name || 'Użytkownik') + '</strong><p>' + esc(c.content) + '</p></div>'
              + '</div>';
          }).join('');
          if (isLoggedIn()) {
            html += '<div class="comment-form">'
              + '<input class="comment-input" type="text" placeholder="Napisz komentarz…" aria-label="Komentarz" data-comment-input maxlength="500">'
              + '<button class="comment-send-btn" type="button" data-comment-submit data-post-id="' + esc(postId) + '">Wyślij</button>'
              + '</div>';
          }
          panel.innerHTML = html || '<p style="color:var(--muted);font-size:13px;padding:0 0 4px">Brak komentarzy. Bądź pierwszy!</p>';
          if (isLoggedIn()) {
            var sendBtn = panel.querySelector('[data-comment-submit]');
            var inputEl = panel.querySelector('[data-comment-input]');
            if (sendBtn && inputEl) {
              sendBtn.addEventListener('click', function () {
                var text = inputEl.value.trim();
                if (!text) return;
                apiFetch('/social/posts/' + postId + '/comment', { method: 'POST', body: JSON.stringify({ content: text }) })
                  .then(function (r) {
                    if (r.status === 201) {
                      var user = getUser();
                      var newComment = '<div class="comment-item">'
                        + '<div class="comment-avatar">' + esc(initials(user.name || user.email)) + '</div>'
                        + '<div class="comment-bubble"><strong>' + esc(user.name || user.email || 'Ty') + '</strong><p>' + esc(text) + '</p></div>'
                        + '</div>';
                      sendBtn.closest('.comment-form').insertAdjacentHTML('beforebegin', newComment);
                      inputEl.value = '';
                      showToast('Komentarz dodany ✅', 'success');
                      // Update count in toggle button
                      var card = panel.closest('.post-card');
                      if (card) {
                        var toggleBtn = card.querySelector('.comment-toggle-btn span');
                        if (toggleBtn) {
                          var n = parseInt(toggleBtn.textContent, 10) || 0;
                          toggleBtn.textContent = (n + 1) + ' komentarzy';
                        }
                      }
                    }
                  })
                  .catch(function () { showToast('Błąd dodawania komentarza', 'error'); });
              });
              inputEl.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
              });
            }
          }
        })
        .catch(function () {
          panel.innerHTML = '<p style="color:var(--muted);font-size:13px">Nie udało się załadować komentarzy.</p>';
        });
    }

    // ── Load posts feed ───────────────────────────────────────────────────────

    var DEMO_POSTS = [
      {
        id: 'demo-1',
        author_name: 'Marek K.',
        content: 'Właśnie uruchomiłem swój sklep na QualitetMarket! Pierwsze produkty z katalogu BigBuy już online. Zapraszam do przeglądania 🎉',
        media_urls: [],
        post_type: 'general',
        likes_count: 14,
        comments_count: 3,
        created_at: new Date(Date.now() - 1800000).toISOString(),
        product_id: null,
      },
      {
        id: 'demo-2',
        author_name: 'Anna W.',
        content: 'Polecam te słuchawki BT Pro — niesamowita jakość dźwięku w tej cenie! Kupiłam przez dropship, klienci super zadowoleni 🎧',
        media_urls: ['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=800&q=60'],
        post_type: 'product',
        likes_count: 38,
        comments_count: 7,
        created_at: new Date(Date.now() - 7200000).toISOString(),
        product_id: null,
      },
      {
        id: 'demo-3',
        author_name: 'Piotr J.',
        content: 'Tip dla nowych sprzedawców: ustawiajcie marżę min. 30% i korzystajcie z narzędzia do generowania opisów AI — oszczędza masę czasu 💡',
        media_urls: [],
        post_type: 'general',
        likes_count: 22,
        comments_count: 5,
        created_at: new Date(Date.now() - 14400000).toISOString(),
        product_id: null,
      },
    ];

    function loadPosts(append) {
      if (state.loading) return;
      state.loading = true;

      var feed = document.getElementById('posts-feed');
      var loadMoreBtn = document.getElementById('load-more-btn');
      if (!feed) { state.loading = false; return; }

      if (!append) {
        feed.innerHTML = '<div class="post-skeleton"></div><div class="post-skeleton"></div><div class="post-skeleton"></div>';
        state.offset = 0;
        state.hasMore = true;
      }

      var params = '?limit=' + PAGE_SIZE + '&offset=' + state.offset;
      if (state.tab && state.tab !== 'all') params += '&type=' + state.tab;

      apiFetch('/social/feed' + params)
        .then(function (res) {
          var posts = [];
          if (res.status === 200) {
            posts = Array.isArray(res.body) ? res.body : (res.body.posts || []);
          }
          if (!append) {
            if (posts.length === 0) {
              feed.innerHTML = DEMO_POSTS.map(renderPostCard).join('');
              DEMO_POSTS.forEach(function (p) { bindPostActions(feed.querySelector('[data-post-id="' + p.id + '"]'), p.id); });
              if (loadMoreBtn) loadMoreBtn.style.display = 'none';
            } else {
              feed.innerHTML = posts.map(renderPostCard).join('');
              posts.forEach(function (p) { bindPostActions(feed.querySelector('[data-post-id="' + p.id + '"]'), p.id); });
              state.hasMore = posts.length >= PAGE_SIZE;
              if (loadMoreBtn) loadMoreBtn.style.display = state.hasMore ? '' : 'none';
            }
          } else {
            posts.forEach(function (p) {
              feed.insertAdjacentHTML('beforeend', renderPostCard(p));
              bindPostActions(feed.lastElementChild, p.id);
            });
            state.hasMore = posts.length >= PAGE_SIZE;
            if (loadMoreBtn) loadMoreBtn.style.display = state.hasMore ? '' : 'none';
          }
          state.offset += posts.length;
        })
        .catch(function () {
          if (!append) {
            feed.innerHTML = DEMO_POSTS.map(renderPostCard).join('');
            DEMO_POSTS.forEach(function (p) { bindPostActions(feed.querySelector('[data-post-id="' + p.id + '"]'), p.id); });
            if (loadMoreBtn) loadMoreBtn.style.display = 'none';
          }
        })
        .finally(function () { state.loading = false; });
    }

    // ── Tab switching ─────────────────────────────────────────────────────────

    function initTabs() {
      document.querySelectorAll('.feed-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.feed-tab').forEach(function (b) {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          state.tab = btn.dataset.tab || 'all';
          loadPosts(false);
        });
      });
    }

    // ── Load more ─────────────────────────────────────────────────────────────

    function initLoadMore() {
      var btn = document.getElementById('load-more-btn');
      if (!btn) return;
      btn.addEventListener('click', function () {
        if (state.hasMore && !state.loading) loadPosts(true);
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    function init() {
      renderCompose();
      initTabs();
      initLoadMore();
      loadPosts(false);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  }());
  </script>
</body>
</html>
