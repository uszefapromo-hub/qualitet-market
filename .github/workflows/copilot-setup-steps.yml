name: "Copilot Setup Steps"

# This workflow configures the environment for GitHub Copilot Coding Agent.
# The job named `copilot-setup-steps` is detected by Copilot and its steps
# are executed BEFORE the sandbox firewall is enabled, allowing npm install
# and other network-dependent setup tasks to succeed.
# Reference: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
