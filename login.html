<!doctype html>
<html lang="pl">
<head>
  <title>Logowanie - HurtDetal Uszefa QUALITET</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="assets/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg">
  <link rel="stylesheet" href="panel.css">
</head>
<body data-page="login" class="auth-page has-bottom-nav">
  <div class="app-splash" data-app-splash>
    <div class="app-splash-card">
      <div class="app-splash-logo">
        <img src="assets/icons/icon-192.svg" alt="UszefaQualitet">
      </div>
      <div class="app-splash-title">
        <strong>UszefaQualitet</strong>
        <span>QualitetMarket</span>
      </div>
      <div class="app-splash-loader"></div>
    </div>
  </div>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">
        <div>
          <strong>UszefaQualitet</strong>
          <span>QualitetMarket</span>
          <span class="brand-tag">U SZEFA</span>
        </div>
      </a>
    </div>
  </header>

  <main class="wrap auth-layout">
    <section class="panel-card auth-card">
      <h1>Logowanie</h1>
      <form class="form-card" data-login-form>
        <label>
          Email
          <input type="email" name="email" placeholder="email@domena.pl" autocomplete="email" required>
        </label>
        <label>
          Hasło
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </label>
        <div class="cta-row auth-actions">
          <button class="btn btn-primary" type="submit">Zaloguj</button>
          <button class="btn btn-secondary" type="button">Utwórz konto</button>
        </div>
      </form>
    </section>
  </main>

  <nav class="bottom-nav" data-bottom-nav aria-label="Nawigacja dolna">
    <a href="index.html" rel="nofollow noreferrer" data-nav="index">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 11.5L12 4l9 7.5"></path>
        <path d="M5 10.5V20h14v-9.5"></path>
      </svg>
      <span>Start</span>
    </a>
    <a href="sklep.html" rel="nofollow noreferrer" data-nav="sklep">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9h18l-1.5 11H4.5L3 9z"></path>
        <path d="M7 9V7a5 5 0 0 1 10 0v2"></path>
      </svg>
      <span>Sklep</span>
    </a>
    <a href="hurtownie.html" rel="nofollow noreferrer" data-nav="hurtownie">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="7" width="7" height="10" rx="1.4"></rect>
        <rect x="14" y="7" width="7" height="10" rx="1.4"></rect>
        <path d="M6.5 7V5.5a1.5 1.5 0 0 1 3 0V7"></path>
      </svg>
      <span>Hurtownie</span>
    </a>
    <a href="dashboard.html" rel="nofollow noreferrer" data-nav="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1.2"></rect>
        <rect x="14" y="3" width="7" height="7" rx="1.2"></rect>
        <rect x="14" y="14" width="7" height="7" rx="1.2"></rect>
        <rect x="3" y="14" width="7" height="7" rx="1.2"></rect>
      </svg>
      <span>Panel</span>
    </a>
    <a href="login.html" rel="nofollow noreferrer" data-nav="login">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c2-3.5 6-5 8-5s6 1.5 8 5"></path>
      </svg>
      <span>Konto</span>
    </a>
  </nav>

  <script src="js/app.js" defer></script>
</body>
</html>
