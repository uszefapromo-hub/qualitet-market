<!doctype html>
<html lang="pl">
<head>
  <title>Logowanie - HurtDetal Uszefa QUALITET</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login" class="auth-page">
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">
        <div>
          <strong>UszefaQualitet</strong>
          <span>QualitetMarket</span>
          <span class="brand-tag">U SZEFA</span>
        </div>
      </a>
    </div>
  </header>

  <main class="wrap auth-layout">
    <section class="panel-card auth-card">
      <h1>Logowanie</h1>
      <form class="form-card" data-login-form>
        <label>
          Email
          <input type="email" name="email" placeholder="email@domena.pl" autocomplete="email" required>
        </label>
        <label>
          Hasło
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </label>
        <div class="cta-row auth-actions">
          <button class="btn btn-primary" type="submit">Zaloguj</button>
          <button class="btn btn-secondary" type="button">Utwórz konto</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
